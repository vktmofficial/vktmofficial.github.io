<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKTM</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:   #060402;
      --bg-2: #130a05;
      --t-1:  #ede2ce;
      --t-2:  #a07a52;
      --t-3:  #5a3820;
      --line: rgba(255,255,255,0.055);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t-1);
      font-family: 'Barlow Condensed', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* grain */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    .gate {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      position: relative;
    }

    .gate-wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(80px, 20vw, 180px);
      letter-spacing: 0.06em;
      color: var(--t-1);
      line-height: 0.9;
      margin-bottom: 32px;
      animation: fadeUp 0.7s ease both;
    }

    .gate-question {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(14px, 3vw, 20px);
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--t-2);
      margin-bottom: 32px;
      animation: fadeUp 0.7s 0.12s ease both;
    }

    .gate-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 300px;
      animation: fadeUp 0.7s 0.22s ease both;
    }

    .gate-input {
      background: var(--bg-2);
      border: 1px solid var(--line);
      color: var(--t-1);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-align: center;
      padding: 14px;
      outline: none;
      transition: border-color 0.15s;
      text-transform: uppercase;
    }
    .gate-input::placeholder {
      color: var(--t-3);
      letter-spacing: 0.15em;
    }
    .gate-input:focus { border-color: var(--t-2); }

    .gate-btn {
      background: var(--t-1);
      color: var(--bg);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 15px;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .gate-btn:hover { background: var(--t-2); }

    .gate-err {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--t-2);
      height: 18px;
      transition: opacity 0.2s;
      opacity: 0;
    }
    .gate-err.show { opacity: 1; }

    .gate-foot {
      position: absolute;
      bottom: 24px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--t-3);
      animation: fadeUp 0.7s 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
<div class="gate">
  <div class="gate-wordmark">VKTM</div>
  <div class="gate-question">Are you one of us?</div>

  <form class="gate-form" id="gate-form" autocomplete="off">
    <input
      class="gate-input"
      id="gate-input"
      type="password"
      placeholder="Enter password"
      autocomplete="new-password"
      spellcheck="false"
    >
    <button class="gate-btn" type="submit">Enter</button>
    <div class="gate-err" id="gate-err">Wrong password</div>
  </form>

  <div class="gate-foot">@vktmofficial — London</div>
</div>

<script>
  if (localStorage.getItem('vktm_unlocked') === '1') {
    window.location.replace('home.html');
  }

  document.getElementById('gate-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const val = document.getElementById('gate-input').value.trim();
    const err = document.getElementById('gate-err');
    if (val === 'VK1TMO') {
      localStorage.setItem('vktm_unlocked', '1');
      window.location.replace('home.html');
    } else {
      err.classList.add('show');
      document.getElementById('gate-input').value = '';
      document.getElementById('gate-input').focus();
      setTimeout(() => err.classList.remove('show'), 2500);
    }
  });
</script>
</body>
</html>
