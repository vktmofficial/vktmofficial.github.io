<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKTM — Order Confirmed</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .success {
      min-height: calc(100vh - var(--nav-h) - 30px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px var(--pad);
    }
    .success-tick {
      font-family: var(--display);
      font-size: 80px;
      color: var(--t-3);
      line-height: 1;
      margin-bottom: 16px;
    }
    .success h1 {
      font-family: var(--display);
      font-size: clamp(48px, 10vw, 100px);
      color: var(--t-1);
      line-height: 0.9;
      letter-spacing: 0.02em;
      margin-bottom: 20px;
    }
    .success p {
      font-family: var(--body);
      font-size: clamp(13px, 1.5vw, 16px);
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--t-2);
      margin-bottom: 8px;
      max-width: 400px;
    }
    .success-note {
      font-family: var(--body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--t-3);
      margin-top: 8px;
      margin-bottom: 36px;
    }
    .success-cta {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
<script src="nav.js"></script>
<script>injectHeader('');</script>

<div class="success">
  <div class="success-tick rev">✓</div>
  <h1 class="rev d1">Order<br>confirmed.</h1>
  <p class="rev d2">Confirmation email is on its way.</p>
  <p class="rev d2">Your order will be fulfilled and tracked via the email you used at checkout.</p>
  <div class="success-note rev d3">No restock. You got there.</div>
  <div class="success-cta rev d4">
    <a href="track.html" class="btn btn-ghost">Track order</a>
    <a href="home.html" class="btn btn-white">Back to VKTM</a>
  </div>
</div>

<script src="main.js"></script>
<script>injectFooter();</script>
</body>
</html>
