<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKTM — Order Confirmed</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .success-wrap {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      max-width: 580px;
      margin: 0 auto;
    }
    .success-mark {
      font-family: var(--font-mark);
      font-size: 64px;
      color: var(--brown-light);
      line-height: 1;
      margin-bottom: 24px;
    }
    .success-wrap h1 {
      font-size: clamp(40px, 8vw, 72px);
      line-height: 1;
      margin-bottom: 16px;
    }
    .success-wrap p {
      font-size: 18px;
      color: var(--cream);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .success-note {
      font-size: 14px;
      color: var(--brown-warm);
      letter-spacing: 0.08em;
      margin-top: 8px;
      margin-bottom: 40px;
    }
    .success-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<script src="nav.js"></script>
<script>injectHeader('');</script>

<div class="success-wrap">
  <div class="success-mark reveal">✓</div>
  <h1 class="reveal reveal-delay-1">Order confirmed.</h1>
  <p class="reveal reveal-delay-2">You're in. Confirmation email is on its way.</p>
  <p class="reveal reveal-delay-2">Your order will be fulfilled and tracked via the email you used at checkout.</p>
  <p class="success-note reveal reveal-delay-3">No restock. You got there.</p>
  <div class="success-actions reveal reveal-delay-4">
    <a href="track.html" class="btn btn-ghost">Track order</a>
    <a href="home.html" class="btn btn-primary">Back to VKTM</a>
  </div>
</div>

<script src="main.js"></script>
<script>injectFooter();</script>

</body>
</html>
