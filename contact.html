<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKTM — Contact</title>
  <meta name="description" content="Get in touch with VKTM.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-wrap {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 24px 100px;
    }
    .contact-wrap h1 {
      font-size: clamp(48px, 10vw, 80px);
      line-height: 1;
      margin-bottom: 12px;
    }
    .contact-intro {
      font-size: 17px;
      color: var(--beige);
      margin-bottom: 48px;
    }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('vktm_unlocked') !== '1') {
    window.location.replace('index.html');
  }
</script>

<script src="nav.js"></script>
<script>injectHeader('contact.html');</script>

<div class="contact-wrap">
  <span class="section-label reveal">Get in touch</span>
  <h1 class="reveal reveal-delay-1">Contact</h1>
  <p class="contact-intro reveal reveal-delay-2">Questions, wholesale, press. Use the form or email direct.</p>

  <div id="contact-form-wrap">
    <form id="contact-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="c-name">Name</label>
          <input class="form-input" id="c-name" name="name" type="text" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="c-email">Email</label>
          <input class="form-input" id="c-email" name="email" type="email" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="c-subject">Subject</label>
        <input class="form-input" id="c-subject" name="subject" type="text" placeholder="What's this about?">
      </div>
      <div class="form-group">
        <label class="form-label" for="c-message">Message</label>
        <textarea class="form-textarea" id="c-message" name="message" placeholder="Say it." required></textarea>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%">Send it</button>
    </form>
  </div>

  <div class="form-success" id="contact-success">
    <h3>Sent.</h3>
    <p>We'll get back to you. Usually within a couple of days.</p>
  </div>
</div>

<script src="main.js"></script>
<script>
  injectFooter();

  document.getElementById('contact-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const data = {
      name: document.getElementById('c-name').value,
      email: document.getElementById('c-email').value,
      subject: document.getElementById('c-subject').value,
      message: document.getElementById('c-message').value,
    };
    try {
      await fetch('https://formspree.io/f/xqeopeve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(data),
      });
    } catch (_) {}
    document.getElementById('contact-form-wrap').style.display = 'none';
    document.getElementById('contact-success').style.display = 'block';
  });
</script>

</body>
</html>
