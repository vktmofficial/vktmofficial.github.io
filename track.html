<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VKTM — Track Order</title>
  <meta name="description" content="Track your VKTM order.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .track-wrap {
      max-width: 540px;
      margin: 0 auto;
      padding: 80px 24px 100px;
    }
    .track-wrap h1 {
      font-size: clamp(40px, 9vw, 72px);
      line-height: 1;
      margin-bottom: 12px;
    }
    .track-intro {
      font-size: 17px;
      color: var(--beige);
      margin-bottom: 48px;
    }
    .track-result {
      display: none;
      margin-top: 32px;
      padding: 24px;
      background: var(--brown-deep);
      border: 1px solid var(--brown-mid);
      border-radius: 2px;
    }
    .track-result h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }
    .track-result p {
      font-size: 16px;
      color: var(--cream);
    }
    .track-result a {
      color: var(--brown-light);
    }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('vktm_unlocked') !== '1') {
    window.location.replace('index.html');
  }
</script>

<script src="nav.js"></script>
<script>injectHeader('');</script>

<div class="track-wrap">
  <span class="section-label reveal">Orders</span>
  <h1 class="reveal reveal-delay-1">Track Order</h1>
  <p class="track-intro reveal reveal-delay-2">Enter your order number and email. You'll find your order number in your confirmation email from Stripe.</p>

  <div id="track-form-wrap">
    <form id="track-form">
      <div class="form-group reveal reveal-delay-2">
        <label class="form-label" for="t-order">Order Number</label>
        <input class="form-input" id="t-order" type="text" placeholder="e.g. VK-00123" required>
      </div>
      <div class="form-group reveal reveal-delay-3">
        <label class="form-label" for="t-email">Email Address</label>
        <input class="form-input" id="t-email" type="email" placeholder="your@email.com" required>
      </div>
      <button class="btn btn-primary reveal reveal-delay-4" type="submit" style="width:100%">Track it</button>
    </form>
  </div>

  <div class="track-result" id="track-result">
    <h3>Your order</h3>
    <p>We've sent your tracking details to your email address. Check your inbox — including spam.</p>
    <p style="margin-top:12px">Issues? Email <a href="mailto:vktmofficial@gmail.com">vktmofficial@gmail.com</a> with your order number.</p>
  </div>
</div>

<script src="main.js"></script>
<script>
  injectFooter();

  document.getElementById('track-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const order = document.getElementById('t-order').value.trim();
    const email = document.getElementById('t-email').value.trim();
    try {
      await fetch('https://formspree.io/f/xqeopeve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          _subject: 'VKTM Order Tracking Request',
          order_number: order,
          email
        }),
      });
    } catch (_) {}
    document.getElementById('track-form-wrap').style.display = 'none';
    document.getElementById('track-result').style.display = 'block';
  });
</script>

</body>
</html>
