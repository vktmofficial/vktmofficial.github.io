<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- VKTM Mark v2 — hand-drawn cross with letters -->
  <!-- Background -->
  <rect width="240" height="240" fill="#0e0905"/>

  <!-- Cross arms — rough, hand-drawn feel via slightly offset strokes -->
  <!-- Vertical bar -->
  <rect x="108" y="20" width="24" height="200" rx="2" fill="#2b1408"/>
  <!-- Horizontal bar -->
  <rect x="20" y="108" width="200" height="24" rx="2" fill="#2b1408"/>

  <!-- Cross outline / texture layer -->
  <rect x="108" y="20" width="24" height="200" rx="2"
        fill="none" stroke="#4a2210" stroke-width="1"/>
  <rect x="20" y="108" width="200" height="24" rx="2"
        fill="none" stroke="#4a2210" stroke-width="1"/>

  <!-- Letters in corners — Permanent Marker style approximated with bold paths -->
  <!-- V — top left -->
  <text x="48" y="96" font-family="'Permanent Marker', cursive"
        font-size="42" fill="#d9b88a" text-anchor="middle"
        dominant-baseline="middle">V</text>
  <!-- K — top right -->
  <text x="192" y="96" font-family="'Permanent Marker', cursive"
        font-size="42" fill="#d9b88a" text-anchor="middle"
        dominant-baseline="middle">K</text>
  <!-- T — bottom left -->
  <text x="48" y="192" font-family="'Permanent Marker', cursive"
        font-size="42" fill="#d9b88a" text-anchor="middle"
        dominant-baseline="middle">T</text>
  <!-- M — bottom right -->
  <text x="192" y="192" font-family="'Permanent Marker', cursive"
        font-size="42" fill="#d9b88a" text-anchor="middle"
        dominant-baseline="middle">M</text>

  <!-- Center square accent -->
  <rect x="112" y="112" width="16" height="16" rx="1" fill="#b06030"/>
</svg>
