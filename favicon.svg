<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- VKTM Favicon — Crown Mark -->
  <!-- Background -->
  <rect width="32" height="32" fill="#1A1108"/>
  <!-- Crown shape — 5 points -->
  <path d="M4,26 L4,18 L7,11 L11,16 L16,6 L21,16 L25,11 L28,18 L28,26 Z"
        fill="#8B1A0E"/>
  <!-- Crown gem dots -->
  <circle cx="16" cy="7"  r="1.8" fill="#F0EDE8"/>
  <circle cx="11" cy="13" r="1.2" fill="#F0EDE8" opacity="0.8"/>
  <circle cx="21" cy="13" r="1.2" fill="#F0EDE8" opacity="0.8"/>
  <!-- Skull in crown body -->
  <ellipse cx="16" cy="21" rx="5" ry="5.5" fill="#0A0A08" stroke="#F0EDE8" stroke-width="0.8"/>
  <ellipse cx="14" cy="20" rx="1.3" ry="1.5" fill="#0A0A08" stroke="#F0EDE8" stroke-width="0.7"/>
  <ellipse cx="18" cy="20" rx="1.3" ry="1.5" fill="#0A0A08" stroke="#F0EDE8" stroke-width="0.7"/>
  <path d="M13,25 L14,27 L15,25 L16,27 L17,25 L18,27 L19,25"
        fill="none" stroke="#F0EDE8" stroke-width="0.8" stroke-linejoin="round"/>
</svg>
