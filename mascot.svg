<svg viewBox="0 0 200 380" xmlns="http://www.w3.org/2000/svg">
  <!-- VKTM Mascot v2 — simplified hand-drawn figure placeholder -->
  <!-- KITTL will replace this with proper artwork -->
  <rect width="200" height="380" fill="none"/>

  <!-- Body — boxy oversized hoodie silhouette -->
  <path d="M 60,130 L 40,280 L 80,278 L 84,200 L 100,204 L 116,200 L 120,278 L 160,280 L 140,130 Z"
        fill="#2b1408" stroke="#4a2210" stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Sleeves -->
  <path d="M 60,130 L 32,220 L 48,224 L 70,155"
        fill="#2b1408" stroke="#4a2210" stroke-width="1.5"
        stroke-linejoin="round"/>
  <path d="M 140,130 L 168,220 L 152,224 L 130,155"
        fill="#2b1408" stroke="#4a2210" stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Hood / neck -->
  <path d="M 68,130 Q 70,105 100,102 Q 130,105 132,130 L 120,132 Q 115,115 100,114 Q 85,115 80,132 Z"
        fill="#1a0c06" stroke="#4a2210" stroke-width="1.5"/>

  <!-- Head — simple round -->
  <ellipse cx="100" cy="85" rx="32" ry="34"
           fill="#1a0c06" stroke="#7a3d18" stroke-width="1.5"/>

  <!-- Eyes — simple dots -->
  <circle cx="89" cy="82" r="4" fill="#d9b88a"/>
  <circle cx="111" cy="82" r="4" fill="#d9b88a"/>
  <!-- Eye shine -->
  <circle cx="91" cy="80" r="1.5" fill="#0e0905"/>
  <circle cx="113" cy="80" r="1.5" fill="#0e0905"/>

  <!-- Mouth — flat line -->
  <line x1="93" y1="96" x2="107" y2="96"
        stroke="#7a3d18" stroke-width="1.5" stroke-linecap="round"/>

  <!-- VKTM text on chest -->
  <text x="100" y="175" font-family="'Permanent Marker', cursive"
        font-size="14" fill="#b06030" text-anchor="middle"
        letter-spacing="2">VKTM</text>

  <!-- Legs -->
  <rect x="78" y="278" width="18" height="65" rx="3"
        fill="#1a0c06" stroke="#4a2210" stroke-width="1.2"/>
  <rect x="104" y="278" width="18" height="65" rx="3"
        fill="#1a0c06" stroke="#4a2210" stroke-width="1.2"/>

  <!-- Shoes -->
  <ellipse cx="87" cy="344" rx="14" ry="7"
           fill="#2b1408" stroke="#7a3d18" stroke-width="1.2"/>
  <ellipse cx="113" cy="344" rx="14" ry="7"
           fill="#2b1408" stroke="#7a3d18" stroke-width="1.2"/>
</svg>
