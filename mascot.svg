<svg viewBox="0 0 240 480" xmlns="http://www.w3.org/2000/svg" style="background:#0A0A08;">
  <!--
    VKTM MASCOT — The Crowned Skeleton
    Primary character mark. London-rooted streetwear energy.
    Use: clothing graphics, website sections, content overlays.
    ============================================
  -->

  <defs>
    <!-- Subtle distress filter -->
    <filter id="distress">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Glow for rust accents -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== CROWN ===== -->
  <!-- Crown band -->
  <rect x="88" y="86" width="64" height="16" rx="1.5"
        fill="#8B1A0E" stroke="#C4250F" stroke-width="1.2"/>
  <!-- 5 crown points — slightly irregular (hand-drawn feel) -->
  <path d="M88,86 L90,64  L98,74  L108,56 L120,72  L132,56 L142,74 L150,64 L152,86 Z"
        fill="#8B1A0E" stroke="#C4250F" stroke-width="1.4" stroke-linejoin="round"
        filter="url(#distress)"/>
  <!-- Crown gems -->
  <circle cx="120" cy="56" r="4"   fill="#F0EDE8" filter="url(#glow)"/>
  <circle cx="108" cy="60" r="2.5" fill="#F0EDE8" opacity="0.85"/>
  <circle cx="132" cy="60" r="2.5" fill="#F0EDE8" opacity="0.85"/>
  <circle cx="90"  cy="69" r="1.8" fill="#8B5E3C"/>
  <circle cx="150" cy="69" r="1.8" fill="#8B5E3C"/>
  <!-- VK1 engraved in crown band -->
  <text x="120" y="98" font-family="DM Mono, monospace" font-size="7" fill="#F0EDE8"
        text-anchor="middle" letter-spacing="4" opacity="0.75">VK1 TMO</text>

  <!-- ===== SKULL ===== -->
  <ellipse cx="120" cy="130" rx="32" ry="36" fill="#0A0A08" stroke="#F0EDE8" stroke-width="2"
           filter="url(#distress)"/>
  <!-- Cheekbones -->
  <path d="M88,128 C86,126 84,130 86,135" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <path d="M152,128 C154,126 156,130 154,135" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <!-- Eye sockets — hollow, irregular -->
  <path d="M105,120 C102,114 96,114 93,120 C90,126 93,134 98,134 C103,134 106,128 105,120 Z"
        fill="#0A0A08" stroke="#F0EDE8" stroke-width="1.5"/>
  <path d="M147,120 C144,114 138,114 135,120 C132,126 135,134 140,134 C145,134 148,128 147,120 Z"
        fill="#0A0A08" stroke="#F0EDE8" stroke-width="1.5"/>
  <!-- Pupils — tiny dots for character -->
  <circle cx="99"  cy="124" r="2" fill="#8B1A0E" opacity="0.8"/>
  <circle cx="141" cy="124" r="2" fill="#8B1A0E" opacity="0.8"/>
  <!-- Nasal cavity -->
  <path d="M116,140 C118,144 122,144 124,140" fill="none" stroke="#F0EDE8" stroke-width="1.4"/>
  <!-- Teeth — uneven, hand-drawn -->
  <path d="M96,158 L101,167 L107,157 L113,168 L120,157 L127,168 L133,157 L139,167 L144,158"
        fill="none" stroke="#F0EDE8" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Jaw outline hint -->
  <path d="M88,150 C88,162 100,172 120,172 C140,172 152,162 152,150"
        fill="none" stroke="#F0EDE8" stroke-width="1.2" opacity="0.4"/>

  <!-- ===== NECK & SPINE ===== -->
  <line x1="120" y1="172" x2="120" y2="192" stroke="#F0EDE8" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Chain around neck -->
  <path d="M100,180 C100,175 106,172 120,172 C134,172 140,175 140,180 C140,185 134,188 120,188 C106,188 100,185 100,180 Z"
        fill="none" stroke="#8B5E3C" stroke-width="1.2" stroke-dasharray="3 2"/>
  <!-- Chain pendant — small cross/tag -->
  <rect x="116" y="186" width="8" height="10" rx="1" fill="none" stroke="#8B5E3C" stroke-width="1"/>
  <text x="120" y="194" font-family="DM Mono, monospace" font-size="4" fill="#8B5E3C"
        text-anchor="middle">VK</text>

  <!-- Spine (segmented, vertebra-like) -->
  <path d="M120,192 C118,202 122,212 120,222 C118,232 122,242 120,252 C118,262 122,272 120,282"
        fill="none" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>
  <!-- Vertebra dots -->
  <circle cx="120" cy="197" r="2.5" fill="none" stroke="#F0EDE8" stroke-width="1"/>
  <circle cx="120" cy="212" r="2.5" fill="none" stroke="#F0EDE8" stroke-width="1"/>
  <circle cx="120" cy="227" r="2.5" fill="none" stroke="#F0EDE8" stroke-width="1"/>
  <circle cx="120" cy="242" r="2.5" fill="none" stroke="#F0EDE8" stroke-width="1"/>
  <circle cx="120" cy="257" r="2.5" fill="none" stroke="#F0EDE8" stroke-width="1"/>

  <!-- ===== RIBCAGE ===== -->
  <!-- Ribs LEFT — 4 pairs, slightly curved -->
  <path d="M118,202 C106,197 92,206 94,215" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M118,214 C104,208 88,218 90,228" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M118,226 C106,222 92,232 94,242" fill="none" stroke="#F0EDE8" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M118,238 C108,236 96,244 98,253" fill="none" stroke="#F0EDE8" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Ribs RIGHT -->
  <path d="M122,202 C134,197 148,206 146,215" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M122,214 C136,208 152,218 150,228" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M122,226 C134,222 148,232 146,242" fill="none" stroke="#F0EDE8" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M122,238 C132,236 144,244 142,253" fill="none" stroke="#F0EDE8" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Sternum centre line -->
  <line x1="120" y1="196" x2="120" y2="264" stroke="#F0EDE8" stroke-width="0.6" opacity="0.3"/>

  <!-- ===== CLAVICLE / SHOULDERS ===== -->
  <path d="M120,192 C108,190 96,192 86,198" fill="none" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>
  <path d="M120,192 C132,190 144,192 154,198" fill="none" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>

  <!-- ===== ARMS ===== -->
  <!-- Left arm — slightly out and angled, London pose (relaxed but present) -->
  <path d="M86,198 C74,205 58,220 46,240" fill="none" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>
  <!-- Left forearm -->
  <path d="M46,240 C38,255 36,272 40,288" fill="none" stroke="#F0EDE8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left elbow knob -->
  <circle cx="46" cy="240" r="3" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <!-- Left hand / fingers -->
  <path d="M40,288 C35,298 30,306 28,314" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40,288 C38,300 36,308 36,318" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40,288 C42,300 42,308 44,318" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M40,288 C46,298 48,306 52,313" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chain/bracelet on left wrist -->
  <path d="M34,296 C34,292 40,290 46,292 C52,294 54,298 50,302"
        fill="none" stroke="#8B5E3C" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- Right arm — mirror -->
  <path d="M154,198 C166,205 182,220 194,240" fill="none" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>
  <!-- Right forearm -->
  <path d="M194,240 C202,255 204,272 200,288" fill="none" stroke="#F0EDE8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right elbow knob -->
  <circle cx="194" cy="240" r="3" fill="none" stroke="#F0EDE8" stroke-width="1.2"/>
  <!-- Right hand / fingers -->
  <path d="M200,288 C205,298 210,306 212,314" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M200,288 C202,300 204,308 204,318" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M200,288 C198,300 198,308 196,318" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M200,288 C194,298 192,306 188,313" fill="none" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chain/bracelet on right wrist -->
  <path d="M206,296 C206,292 200,290 194,292 C188,294 186,298 190,302"
        fill="none" stroke="#8B5E3C" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- ===== PELVIS ===== -->
  <path d="M100,282 C100,298 108,308 120,308 C132,308 140,298 140,282"
        fill="none" stroke="#F0EDE8" stroke-width="2"/>
  <!-- Hip joints -->
  <circle cx="100" cy="282" r="4" fill="none" stroke="#F0EDE8" stroke-width="1.5"/>
  <circle cx="140" cy="282" r="4" fill="none" stroke="#F0EDE8" stroke-width="1.5"/>
  <!-- Pubic bone detail -->
  <path d="M110,308 C112,314 128,314 130,308" fill="none" stroke="#F0EDE8" stroke-width="1" opacity="0.5"/>

  <!-- ===== LEGS ===== -->
  <!-- Left thigh -->
  <path d="M100,282 C94,306 88,332 84,360" fill="none" stroke="#F0EDE8" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Left kneecap -->
  <ellipse cx="84" cy="360" rx="5" ry="4" fill="none" stroke="#F0EDE8" stroke-width="1.5"/>
  <!-- Left lower leg -->
  <path d="M84,364 C80,386 76,408 74,432" fill="none" stroke="#F0EDE8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left ankle / foot -->
  <path d="M74,432 L58,442" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>
  <path d="M74,432 L66,448" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right thigh -->
  <path d="M140,282 C146,306 152,332 156,360" fill="none" stroke="#F0EDE8" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right kneecap -->
  <ellipse cx="156" cy="360" rx="5" ry="4" fill="none" stroke="#F0EDE8" stroke-width="1.5"/>
  <!-- Right lower leg -->
  <path d="M156,364 C160,386 164,408 166,432" fill="none" stroke="#F0EDE8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right ankle / foot -->
  <path d="M166,432 L182,442" stroke="#F0EDE8" stroke-width="2" stroke-linecap="round"/>
  <path d="M166,432 L174,448" stroke="#F0EDE8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ===== VKTM CROSS MARK on chest ===== -->
  <!-- Simplified cross on sternum — like a chest tattoo / print -->
  <g transform="translate(106,216)" opacity="0.55">
    <path d="M14,0 L14,8 L22,8 L22,14 L14,14 L14,22 L8,22 L8,14 L0,14 L0,8 L8,8 L8,0 Z"
          fill="none" stroke="#8B1A0E" stroke-width="1" stroke-linejoin="round"/>
    <text x="11" y="-2" font-family="Bebas Neue, sans-serif" font-size="7" fill="#8B1A0E" text-anchor="middle">V</text>
    <text x="11" y="30" font-family="Bebas Neue, sans-serif" font-size="7" fill="#8B1A0E" text-anchor="middle">M</text>
    <text x="-3" y="15" font-family="Bebas Neue, sans-serif" font-size="7" fill="#8B1A0E" text-anchor="middle" dominant-baseline="middle">K</text>
    <text x="25" y="15" font-family="Bebas Neue, sans-serif" font-size="7" fill="#8B1A0E" text-anchor="middle" dominant-baseline="middle">T</text>
  </g>

  <!-- ===== DECORATIVE ELEMENTS ===== -->
  <!-- Stars scattered around the figure -->
  <text x="30"  y="180" font-size="10" fill="#8B1A0E" opacity="0.5">✦</text>
  <text x="198" y="180" font-size="10" fill="#8B1A0E" opacity="0.5">✦</text>
  <text x="20"  y="340" font-size="8"  fill="#6B3A1F" opacity="0.4">✦</text>
  <text x="210" y="340" font-size="8"  fill="#6B3A1F" opacity="0.4">✦</text>
  <text x="52"  y="430" font-size="7"  fill="#6B3A1F" opacity="0.3">·</text>
  <text x="178" y="430" font-size="7"  fill="#6B3A1F" opacity="0.3">·</text>

  <!-- Coordinate markers -->
  <text x="10"  y="60" font-family="DM Mono, monospace" font-size="7" fill="#6B3A1F"
        opacity="0.4" letter-spacing="1">51.5074°N</text>
  <text x="10"  y="70" font-family="DM Mono, monospace" font-size="7" fill="#6B3A1F"
        opacity="0.4" letter-spacing="1">0.1278°W</text>
  <text x="170" y="60" font-family="DM Mono, monospace" font-size="7" fill="#6B3A1F"
        opacity="0.4" letter-spacing="1">VK1 TMO</text>
  <text x="170" y="70" font-family="DM Mono, monospace" font-size="7" fill="#6B3A1F"
        opacity="0.4" letter-spacing="1">LONDON</text>

  <!-- VKTM label below figure -->
  <text x="120" y="468" font-family="UnifrakturMaguntia, serif" font-size="28" fill="#F0EDE8"
        text-anchor="middle" letter-spacing="4" opacity="0.9">VKTM</text>

  <!-- Barbed wire at base -->
  <path d="M40,456 Q48,452 56,456 Q64,460 72,456 Q80,452 88,456 Q96,460 104,456 Q112,452 120,456 Q128,460 136,456 Q144,452 152,456 Q160,460 168,456 Q176,452 184,456 Q192,460 200,456"
        fill="none" stroke="#6B3A1F" stroke-width="1.2" opacity="0.6"/>
  <g stroke="#6B3A1F" stroke-width="1.2" opacity="0.6">
    <line x1="55" y1="450" x2="61" y2="462"/><line x1="55" y1="462" x2="61" y2="450"/>
    <line x1="103" y1="450" x2="109" y2="462"/><line x1="103" y1="462" x2="109" y2="450"/>
    <line x1="151" y1="450" x2="157" y2="462"/><line x1="151" y1="462" x2="157" y2="450"/>
    <line x1="199" y1="450" x2="205" y2="462"/><line x1="199" y1="462" x2="205" y2="450"/>
  </g>

</svg>
